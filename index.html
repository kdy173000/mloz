<!-- Pretendard -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />

<div class="dilution-calculator">

  <h2 class="calc-title">희석비&nbsp;</h2>

  <div class="calc-body">

    <div class="calc-input">
      <label>희석비</label>
      <div class="ratio-input">
        <span>1:</span>
        <input type="text" id="waterRatio" placeholder="10" inputmode="decimal">
      </div>

      <label>총 용량 (ml)</label>
      <input type="text" id="totalAmount" placeholder="1000" inputmode="decimal">
    </div>

    <div class="result">
      <p class="result-label">원액</p>
      <div class="result-value">
        <input type="text" id="shampooAmount" placeholder="0" inputmode="decimal" class="result-input"> ml
      </div>

      <p class="result-label">물</p>
      <div class="result-value">
        <input type="text" id="waterAmount" placeholder="0" inputmode="decimal" class="result-input"> ml
      </div>
    </div>

  </div>
</div>

<script>
const waterRatioEl = document.getElementById("waterRatio");
const totalAmountEl = document.getElementById("totalAmount");
const shampooAmountEl = document.getElementById("shampooAmount");
const waterAmountEl = document.getElementById("waterAmount");

const fields = [waterRatioEl, totalAmountEl, shampooAmountEl, waterAmountEl];
let isUpdating = false;

function parseNumber(value) {
  if (value === null || value === undefined) return NaN;
  const cleaned = String(value).trim().replace(/,/g, ".");
  if (cleaned === "") return NaN;
  return parseFloat(cleaned);
}

function formatNumber(value) {
  if (!isFinite(value)) return "";
  const rounded = Math.round(value * 100) / 100;
  return Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(2);
}

function isFilled(el) {
  return el.value.trim() !== "";
}

function getFilledFields() {
  return fields.filter(isFilled);
}

function clearField(el) {
  el.value = "";
}

function clearAllExcept(activeEl) {
  fields.forEach((el) => {
    if (el !== activeEl) clearField(el);
  });
}

function setValues(values) {
  isUpdating = true;

  if (values.waterRatio !== undefined) waterRatioEl.value = formatNumber(values.waterRatio);
  if (values.totalAmount !== undefined) totalAmountEl.value = formatNumber(values.totalAmount);
  if (values.shampooAmount !== undefined) shampooAmountEl.value = formatNumber(values.shampooAmount);
  if (values.waterAmount !== undefined) waterAmountEl.value = formatNumber(values.waterAmount);

  isUpdating = false;
}

function calculateFromTwoInputs() {
  const ratio = parseNumber(waterRatioEl.value);
  const total = parseNumber(totalAmountEl.value);
  const shampoo = parseNumber(shampooAmountEl.value);
  const water = parseNumber(waterAmountEl.value);

  const ratioFilled = !isNaN(ratio);
  const totalFilled = !isNaN(total);
  const shampooFilled = !isNaN(shampoo);
  const waterFilled = !isNaN(water);

  // 1) 희석비 + 총용량 -> 원액 + 물
  if (ratioFilled && totalFilled && !shampooFilled && !waterFilled) {
    if (ratio < 0 || total < 0) return;
    const shampooAmount = total / (1 + ratio);
    const waterAmount = total - shampooAmount;

    setValues({
      shampooAmount,
      waterAmount
    });
    return;
  }

  // 2) 희석비 + 원액 -> 총용량 + 물
  if (ratioFilled && shampooFilled && !totalFilled && !waterFilled) {
    if (ratio < 0 || shampoo < 0) return;
    const waterAmount = shampoo * ratio;
    const totalAmount = shampoo + waterAmount;

    setValues({
      totalAmount,
      waterAmount
    });
    return;
  }

  // 3) 희석비 + 물 -> 원액 + 총용량
  if (ratioFilled && waterFilled && !totalFilled && !shampooFilled) {
    if (ratio <= 0 || water < 0) return;
    const shampooAmount = water / ratio;
    const totalAmount = shampooAmount + water;

    setValues({
      shampooAmount,
      totalAmount
    });
    return;
  }

  // 4) 총용량 + 원액 -> 희석비 + 물
  if (totalFilled && shampooFilled && !ratioFilled && !waterFilled) {
    if (total < 0 || shampoo < 0 || shampoo > total || shampoo === 0) return;
    const waterAmount = total - shampoo;
    const waterRatio = waterAmount / shampoo;

    setValues({
      waterRatio,
      waterAmount
    });
    return;
  }

  // 5) 총용량 + 물 -> 희석비 + 원액
  if (totalFilled && waterFilled && !ratioFilled && !shampooFilled) {
    if (total < 0 || water < 0 || water > total) return;
    const shampooAmount = total - water;
    if (shampooAmount <= 0) return;
    const waterRatio = water / shampooAmount;

    setValues({
      waterRatio,
      shampooAmount
    });
    return;
  }

  // 6) 원액 + 물 -> 희석비 + 총용량
  if (shampooFilled && waterFilled && !ratioFilled && !totalFilled) {
    if (shampoo <= 0 || water < 0) return;
    const waterRatio = water / shampoo;
    const totalAmount = shampoo + water;

    setValues({
      waterRatio,
      totalAmount
    });
    return;
  }
}

function handleInput(e) {
  if (isUpdating) return;

  const filledCount = getFilledFields().length;

  if (filledCount === 2) {
    calculateFromTwoInputs();
  }
}

function handleFocus(e) {
  if (isUpdating) return;

  const filledCount = getFilledFields().length;

  // 이미 4칸이 모두 채워져 있으면,
  // 수정하려는 칸 하나만 남기고 나머지 3칸 비움
  if (filledCount === 4) {
    isUpdating = true;
    clearAllExcept(e.target);
    isUpdating = false;
  }
}

fields.forEach((field) => {
  field.addEventListener("focus", handleFocus);
  field.addEventListener("input", handleInput);
});
</script>
