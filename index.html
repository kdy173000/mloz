<!-- Pretendard -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />

<div class="dilution-calculator">

  <h2 class="calc-title">ml ↔ oz</h2>

  <div class="calc-body">

    <div class="calc-input">
      <label>ml</label>
      <input type="text" id="mlAmount" placeholder="500" inputmode="decimal">

      <label>oz</label>
      <input type="text" id="ozAmount" placeholder="16.91" inputmode="decimal">
    </div>

  </div>
</div>

<style>
:root{
  color-scheme: light dark;
  --ui-font: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;

  --calc-border: #d9d9d9;
  --divider: #e5e5e5;
  --text-main: #111111;
  --text-sub: #444444;
  --input-bg: transparent;
  --input-border: #cfcfcf;
  --placeholder: #9a9a9a;
}

@media (prefers-color-scheme: dark){
  :root{
    --calc-border: #6b6b6b;
    --divider: #555555;
    --text-main: #f5f5f5;
    --text-sub: #d6d6d6;
    --input-border: #666666;
    --placeholder: #9b9b9b;
  }
}

.dilution-calculator{
  font-family: var(--ui-font);
  border: 1px solid var(--calc-border);
  border-radius: 14px;
  padding: 30px;
  max-width: 700px;
  margin: auto;
  background: transparent;
  color: var(--text-main);
}

.calc-title{
  text-align: center;
  margin-bottom: 25px;
  font-size: 26px;
  font-weight: 700;
}

.calc-body{
  display: flex;
}

.calc-input{
  width: 100%;
}

label{
  display: block;
  color: var(--text-sub);
  font-weight: 500;
}

input{
  width: 100%;
  padding: 10px;
  margin: 8px 0 15px 0;
  border-radius: 6px;
  border: 1px solid var(--input-border);
  font-size: 16px;
  font-family: var(--ui-font);
  background: transparent;
  color: var(--text-main);
  outline: none;
}

input::placeholder{
  color: var(--placeholder);
}

/* MOBILE */
@media (max-width: 768px){
  .dilution-calculator{
    padding: 18px;
  }

  .calc-title{
    font-size: 22px;
  }

  input{
    font-size: 15px;
  }
}
</style>

<script>
const mlInput = document.getElementById("mlAmount");
const ozInput = document.getElementById("ozAmount");

let isUpdating = false;

// ml → oz
mlInput.addEventListener("input", () => {
  if (isUpdating) return;
  isUpdating = true;

  const ml = parseFloat(mlInput.value.replace(",", "."));

  if (!isNaN(ml)) {
    ozInput.value = (ml * 0.033814).toFixed(2);
  } else {
    ozInput.value = "";
  }

  isUpdating = false;
});

// oz → ml
ozInput.addEventListener("input", () => {
  if (isUpdating) return;
  isUpdating = true;

  const oz = parseFloat(ozInput.value.replace(",", "."));

  if (!isNaN(oz)) {
    mlInput.value = (oz * 29.5735).toFixed(0);
  } else {
    mlInput.value = "";
  }

  isUpdating = false;
});
</script>
