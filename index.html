<!-- Pretendard -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />

<div class="dilution-calculator">

  <h2 class="calc-title">ml ↔ oz &nbsp;</h2>

  <div class="calc-body">

    <div class="calc-input">
      <label>ml</label>
      <input type="text" id="mlAmount" placeholder="500" inputmode="decimal">

      <label>oz</label>
      <input type="text" id="ozAmount" placeholder="16.91" inputmode="decimal">
  </div>
</div>


<style>
:root{
  color-scheme: light dark;
  --ui-font: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;

  /* Light mode */
  --calc-border: #d9d9d9;
  --divider: #e5e5e5;
  --text-main: #111111;
  --text-sub: #444444;
  --input-bg: transparent;
  --input-border: #cfcfcf;
  --placeholder: #9a9a9a;
}

@media (prefers-color-scheme: dark){
  :root{
    /* Dark mode */
    --calc-border: #6b6b6b;
    --divider: #555555;
    --text-main: #f5f5f5;
    --text-sub: #d6d6d6;
    --input-bg: transparent;
    --input-border: #666666;
    --placeholder: #9b9b9b;
  }
}

.dilution-calculator{
  font-family: var(--ui-font);
  border: 1px solid var(--calc-border);
  border-radius: 14px;
  padding: 30px;
  max-width: 700px;
  margin: auto;
  background: transparent;
  color: var(--text-main);
  box-sizing: border-box;
}

/* TITLE */
.calc-title{
  text-align: center;
  margin-bottom: 30px;
  font-size: 26px;
  font-weight: 700;
  color: var(--text-main);
}

/* BODY */
.calc-body{
  display: flex;
  gap: 40px;
}

/* INPUT */
.calc-input{
  flex: 1;
}

label{
  display: block;
  color: var(--text-sub);
  font-weight: 500;
}

input{
  width: 100%;
  padding: 10px;
  margin: 8px 0 15px 0;
  border-radius: 6px;
  border: 1px solid var(--input-border);
  font-size: 16px;
  font-family: var(--ui-font);
  background: var(--input-bg);
  color: var(--text-main);
  box-sizing: border-box;
  outline: none;
}

input::placeholder{
  color: var(--placeholder);
}

input::-webkit-inner-spin-button,
input::-webkit-outer-spin-button{
  -webkit-appearance: none;
  margin: 0;
}

/* RESULT */
.result{
  flex: 1;
  border-left: 1px solid var(--divider);
  padding-left: 30px;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  gap: 6px;
}

.result-label{
  font-size: 18px;
  font-weight: 700;
  margin: 0;
  margin-bottom: 2px;
  line-height: 40px;
  color: var(--text-sub);
}

.result-value{
  font-size: 30px;
  font-weight: 700;
  margin: 0;
  margin-bottom: 10px;
  line-height: 20px;
  color: var(--text-main);
}

/* MOBILE */
@media (max-width: 768px){
  .dilution-calculator{
    padding: 17px;
  }

  .calc-title{
    font-size: 25px;
    margin-bottom: 18px;
    margin-top: 0;
  }

  .calc-body{
    flex-direction: column;
    gap: 15px;
  }

  label{
    font-size: 15px;
    margin-bottom: 2px;
  }

  input{
    padding: 8px;
    font-size: 15px;
  }

  .result{
    border-left: none;
    border-top: 1px solid var(--divider);
    padding-left: 0;
    padding-top: 15px;
  }

  .result-label{
    font-size: 15px;
    line-height: 28px;
  }

  .result-value{
    font-size: 22px;
    line-height: 18px;
  }
}
</style>
